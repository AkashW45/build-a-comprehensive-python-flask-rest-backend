global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:5000']
  - job_name: 'employee-service'
    static_configs:
      - targets: ['employee-service:5001']
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:5010']
  - job_name: 'integration-service'
    static_configs:
      - targets: ['integration-service:5020']
  - job_name: 'compliance-service'
    static_configs:
      - targets: ['compliance-service:5030']
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
